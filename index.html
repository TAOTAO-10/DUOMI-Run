<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#a9d8e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="多米小跑" />
    <meta name="format-detection" content="telephone=no" />
    <title>DUOMI Run - 多米小跑</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icons/domi-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/domi-icon-192.png" />
    <link rel="stylesheet" href="css/styles.css?v=10" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="多米跑酷游戏"></canvas>

      <header class="hud" aria-label="游戏数据">
        <div class="brand-group">
          <span class="wordmark">DUOMI</span>
          <button id="soundBtn" class="sound-button" type="button" aria-pressed="true" aria-label="关闭声音" title="关闭声音">
            <span aria-hidden="true">♪</span>
          </button>
        </div>
        <div class="scoreboard" aria-label="跑步成绩">
          <div id="bestStat" class="score-stat best-stat">
            <span class="score-mark" aria-hidden="true">★</span>
            <span class="score-copy">
              <span class="score-label">BEST</span>
              <strong id="bestHud">00000</strong>
            </span>
          </div>
          <div class="score-stat run-stat">
            <span class="score-mark" aria-hidden="true">◆</span>
            <span class="score-copy">
              <span class="score-label">RUN</span>
              <strong id="scoreHud">00000</strong><em>m</em>
            </span>
          </div>
        </div>
      </header>

      <div id="recordSpark" class="record-spark" aria-hidden="true" hidden>
        <i></i><i></i><i></i><i></i><i></i><i></i>
      </div>

      <div id="readyPrompt" class="ready-prompt" aria-hidden="true">
        <span class="paw-pad"></span>
        <span class="paw-toe paw-toe-one"></span>
        <span class="paw-toe paw-toe-two"></span>
        <span class="paw-toe paw-toe-three"></span>
        <span class="paw-toe paw-toe-four"></span>
      </div>

      <section id="gameOverPanel" class="game-over" hidden>
        <h1>GAME OVER</h1>
        <button id="restartBtn" type="button" aria-label="重新开始" title="重新开始">
          <span aria-hidden="true">↻</span>
        </button>
      </section>

    </main>

    <script src="js/mobile.js?v=19" defer></script>
    <script src="js/main.js?v=29" defer></script>
  </body>
</html>
